name: Build and Push Docker Image

# Kích hoạt workflow khi có push lên nhánh main
on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu

    steps:
      - name: 1. Checkout mã nguồn
        uses: actions/checkout@v4

      - name: 2. Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. Build và Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend  # Trỏ vào thư mục chứa code và Dockerfile
          file: ./frontend/Dockerfile # Chỉ định chính xác file Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/baitap6-frontend:latest
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="nguyenhuutiendung/baitap6-frontend:latest"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
